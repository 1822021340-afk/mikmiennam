<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Xe Nâng 2.5 Tấn - Động cơ Xinchai - MIK MIỀN NAM</title>
    
    <!-- Logo tab -->
    <link rel="icon" type="image/png" href="logo-mik.png">

    <!-- Font Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* === CƠ BẢN === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: #f8f9fc; color: #2b2d42; line-height: 1.6; }

        /* === MENU === */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 12px 0; background: rgba(11, 37, 69, 0.98); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
        .logo-text h1 { font-size: 24px; color: #F4A261; font-weight: 900; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu a { color: #fff; text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; }

        /* === SẢN PHẨM === */
        .product-detail-container { max-width: 1200px; margin: 100px auto 50px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        .main-image { width: 100%; height: 500px; border-radius: 12px; overflow: hidden; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .main-image img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }

        /* === THÔNG TIN === */
        .product-info h1 { font-size: 32px; color: #0B2545; font-weight: 900; margin-bottom: 20px; }
        .specs-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .specs-table th, .specs-table td { padding: 15px; border: 1px solid #ddd; }
        .specs-table th { background: #f1f3f5; width: 40%; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 15px; }
        .btn-call { background: #e76f51; color: #fff; text-align: center; padding: 16px; border-radius: 8px; font-weight: 800; text-decoration: none; }
        .btn-zalo { background: #0068ff; color: #fff; text-align: center; padding: 16px; border-radius: 8px; font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-text"><h1>NGUYÊN MIK</h1></a>
            <ul class="nav-menu">
                <li><a href="index.html">Trang Chủ</a></li>
            </ul>
        </div>
    </header>

    <section class="product-detail-container">
        <div class="main-image">
            <img src="xenang2.5txinchai.jpg" alt="Xe nâng 2.5 Tấn Xinchai">
        </div>

        <div class="product-info">
            <h1>Xe nâng 2,5 Tấn - Động cơ Xinchai</h1>
            <div class="action-buttons">
                <a href="tel:0963094111" class="btn-call">📞 GỌI NGAY: 0963.094.111</a>
                <a href="https://zalo.me/0963094111" target="_blank" class="btn-zalo">CHAT ZALO NHẬN BÁO GIÁ</a>
            </div>
        </div>
    </section>

    <section style="max-width: 1200px; margin: 0 auto 50px auto; padding: 20px;">
        <h3>Thông số kỹ thuật</h3>
        <table class="specs-table" style="margin-top: 20px;">
            <tr><th>Tải trọng</th><td>2,5 Tấn</td></tr>
            <tr><th>Động cơ</th><td>Xinchai C490</td></tr>
            <tr><th>Công suất</th><td>40 kW</td></tr>
            <tr><th>Chiều cao nâng</th><td>3 mét</td></tr>
            <tr><th>Vận hành</th><td>Số tự động</td></tr>
            <tr><th>Lốp trước</th><td>28x9-15</td></tr>
            <tr><th>Lốp sau</th><td>650-10</td></tr>
        </table>
    </section>
<script>
    // Khóa click chuột phải
    document.addEventListener('contextmenu', event => event.preventDefault());
    
    // Khóa các phím tắt chuyên copy và xem mã nguồn (F12, Ctrl+U, Ctrl+Shift+I)
    document.onkeydown = function(e) {
        if(e.keyCode == 123) { return false; } // F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
    }
</script>
</body>
</html>
